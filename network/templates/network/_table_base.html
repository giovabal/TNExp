<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
  <meta name="robots" content="{{ robots_meta }}">
  <meta name="generator" content="Pulpit">
  {% block head_extra %}{% endblock %}
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/tables.css" type="text/css">
</head>
<body>
  <div class="container-fluid py-3">
    {% block content %}{% endblock %}
  </div>
  <script src="js/tables_sort.js"></script>
  <footer class="text-center text-muted small py-3 mt-4 border-top">
    Analyzed with<br>
    <a href="https://github.com/giovabal/pulpit" target="_blank" rel="noopener noreferrer" style="display:inline-block;margin-top:.35rem;">
      <img src="pulpit_logo.svg" alt="Pulpit" style="height:2.2rem;width:auto;opacity:.75;">
    </a>
  </footer>
</body>
</html>
