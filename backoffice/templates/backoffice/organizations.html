{% extends "backoffice/base.html" %}
{% load static %}

{% block bo_content %}
<div class="bo-section-header">
  <h2 class="bo-section-title">Organizations</h2>
  <button class="bo-btn" id="org-add-btn"><i class="bi bi-plus me-1" aria-hidden="true"></i>Add organization</button>
</div>

<form class="bo-add-form d-none" id="org-add-form" autocomplete="off">
  <input class="bo-input" name="name" placeholder="Name" required>
  <input class="bo-input bo-input--color" type="color" name="color" value="#4338ca">
  <label class="bo-check-label">
    <input type="checkbox" name="is_interesting" checked> Interesting
  </label>
  <button type="submit" class="bo-btn">Save</button>
  <button type="button" class="bo-btn bo-btn--ghost" id="org-add-cancel">Cancel</button>
</form>

<div class="bo-toolbar">
  <span class="bo-count" id="org-count"></span>
  <div class="bo-pagination" id="org-pagination-top"></div>
</div>
<div class="table-responsive">
  <table class="bo-table" id="org-table">
    <thead>
      <tr>
        <th>Color</th>
        <th>Name</th>
        <th class="bo-th--center">Interesting</th>
        <th class="bo-th--num">Channels</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="org-tbody">
      <tr><td colspan="5" class="bo-empty">Loading…</td></tr>
    </tbody>
  </table>
</div>
<div class="bo-pagination bo-pagination--bottom" id="org-pagination-bottom"></div>
{% endblock bo_content %}

{% block extra_scripts %}
{{ block.super }}
<script src="{% static 'backoffice/js/crud.js' %}"></script>
<script src="{% static 'backoffice/js/organizations.js' %}"></script>
{% endblock extra_scripts %}
