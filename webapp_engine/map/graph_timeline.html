<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="robots" content="noindex">
  <meta name="generator" content="Pulpit">
  <title>Pulpit project — timeline</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,height=device-height,initial-scale=1,user-scalable=no">
  <meta name="theme-color" content="#123">
  <link rel="icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Serif:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/graph.css" type="text/css" media="screen">
  <style>
    /* ---- year overlay ---- */
    #year-overlay {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      font-family: "IBM Plex Mono", ui-monospace, monospace;
      font-size: clamp(2.8rem, 8vw, 6rem);
      font-weight: 700;
      color: rgba(255,255,255,0.10);
      letter-spacing: .04em;
      pointer-events: none;
      user-select: none;
      z-index: 5;
      transition: color .4s;
    }
    #year-overlay.year-active { color: rgba(255,255,255,0.18); }

    /* ---- timeline scrubber bar ---- */
    #tl-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 10;
      background: rgba(8,24,40,0.72);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255,255,255,0.07);
      padding: .5rem .9rem .55rem;
      display: flex;
      align-items: center;
      gap: .6rem;
    }

    .tl-btn {
      background: none;
      border: none;
      color: rgba(255,255,255,0.65);
      padding: .22rem .35rem;
      font-size: 1.15rem;
      cursor: pointer;
      line-height: 1;
      border-radius: .3rem;
      flex-shrink: 0;
      transition: color .1s, background .1s;
    }
    .tl-btn:hover, .tl-btn:focus { color: #fff; background: rgba(255,255,255,0.08); outline: none; }
    .tl-btn:disabled { color: rgba(255,255,255,0.25); cursor: default; background: none; }

    #tl-year-label {
      font-family: "IBM Plex Mono", ui-monospace, monospace;
      font-size: .9rem;
      font-weight: 700;
      color: rgba(255,255,255,0.85);
      min-width: 3.2rem;
      text-align: center;
      flex-shrink: 0;
    }

    /* scrubber dots */
    #tl-dots {
      display: flex;
      align-items: center;
      gap: .28rem;
      flex: 1;
      justify-content: center;
      flex-wrap: nowrap;
      overflow: hidden;
    }
    .tl-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.22);
      cursor: pointer;
      flex-shrink: 0;
      transition: background .2s, transform .2s;
    }
    .tl-dot.dot-active {
      background: rgba(255,255,255,0.9);
      transform: scale(1.4);
    }
    .tl-dot.dot-past { background: rgba(255,255,255,0.50); }
    .tl-dot:hover { background: rgba(255,255,255,0.75); }

    /* speed buttons */
    .tl-speed-group {
      display: flex;
      gap: .18rem;
      flex-shrink: 0;
    }
    .tl-speed-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.45);
      font-size: .6rem;
      font-family: "IBM Plex Mono", monospace;
      font-weight: 600;
      letter-spacing: .04em;
      padding: .15rem .38rem;
      border-radius: .25rem;
      cursor: pointer;
      transition: color .1s, border-color .1s, background .1s;
    }
    .tl-speed-btn.active {
      color: #fff;
      border-color: rgba(255,255,255,0.55);
      background: rgba(255,255,255,0.08);
    }
    .tl-speed-btn:hover { color: rgba(255,255,255,0.8); border-color: rgba(255,255,255,0.35); }

    /* ---- hide default menu_container on mobile since tl-bar replaces it ---- */
    #menu_container { display: none !important; }

    /* ---- no-timeline message ---- */
    #no-timeline-msg {
      display: none;
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      background: rgba(8,24,40,0.88);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: .75rem;
      padding: 2rem 2.5rem;
      color: rgba(255,255,255,0.75);
      font-size: .95rem;
      text-align: center;
      z-index: 100;
    }
  </style>
</head>
<body>

  <div id="canvas-container" class="sigma-parent">
    <div id="sigma-canvas" class="sigma-expand" aria-label="Timeline network graph"></div>
  </div>

  <div id="year-overlay" aria-live="polite" aria-label="Current year"></div>

  <div id="no-timeline-msg" role="alert">
    <i class="bi bi-calendar-x fs-2 d-block mb-2 opacity-50"></i>
    No timeline data found.<br>
    <small class="text-muted">Run export_network with <code>--timeline-step year</code>.</small>
  </div>

  <!-- transport bar -->
  <div id="tl-bar" role="toolbar" aria-label="Timeline controls">
    <button class="tl-btn" id="tl-first" title="First year" aria-label="Jump to first year"><i class="bi bi-skip-start-fill"></i></button>
    <button class="tl-btn" id="tl-prev"  title="Previous year" aria-label="Previous year"><i class="bi bi-caret-left-fill"></i></button>
    <button class="tl-btn" id="tl-play"  title="Play" aria-label="Play"><i class="bi bi-play-fill"></i></button>
    <button class="tl-btn" id="tl-stop"  title="Stop" aria-label="Stop"><i class="bi bi-stop-fill"></i></button>
    <button class="tl-btn" id="tl-next"  title="Next year" aria-label="Next year"><i class="bi bi-caret-right-fill"></i></button>
    <button class="tl-btn" id="tl-last"  title="Last year" aria-label="Jump to last year"><i class="bi bi-skip-end-fill"></i></button>

    <div id="tl-year-label" aria-live="polite">—</div>

    <div id="tl-dots" role="group" aria-label="Year markers"></div>

    <div class="tl-speed-group" role="group" aria-label="Playback speed">
      <button class="tl-speed-btn" data-speed="slow">SLOW</button>
      <button class="tl-speed-btn active" data-speed="normal">NORM</button>
      <button class="tl-speed-btn" data-speed="fast">FAST</button>
    </div>

    <a href="graph.html" class="tl-btn ms-1" title="Open static graph" aria-label="Open static graph" style="font-size:.95rem;text-decoration:none;"><i class="bi bi-diagram-2"></i></a>
    <a href="index.html" class="tl-btn" title="Back to index" aria-label="Back to index" style="font-size:.95rem;text-decoration:none;"><i class="bi bi-house"></i></a>
  </div>

  <!-- infobar (identical to graph.html) -->
  <aside id="infobar" aria-label="Channel details">
    <button type="button" class="infobar-toggle btn btn-link p-0 text-reset infobar-close" aria-label="Close"><i class="bi bi-x-lg fs-3" aria-hidden="true"></i></button>
    <p id="node_picture"></p>
    <h3 id="node_label"></h3>
    <a id="node_url" href="" target="_blank"></a> <span id="node_location"></span>
    <hr class="infobar-sep">
    <div id="node_details">
      <div class="metric-grid">
        <div class="metric-chip"><span class="metric-label">Users</span><span class="metric-value" id="node_followers_count"></span></div>
        <div class="metric-chip"><span class="metric-label">Messages</span><span class="metric-value" id="node_messages_count"></span></div>
        <div class="metric-chip metric-chip--full"><span class="metric-label">Activity</span><span class="metric-value" id="node_activity_period"></span></div>
      </div>
      <div id="node_measures" class="infobar-measures"></div>
      <p><span id="node_is_lost" role="status"><i class="bi bi-exclamation-triangle" aria-hidden="true"></i> not active anymore.</span></p>
      <p id="node_group"></p>
    </div>
    <div class="accordion" id="accordion">
      <div class="accordion-item">
        <h2 class="accordion-header" id="headingOne">
          <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseOne" aria-expanded="false" aria-controls="collapseOne">Two ways connections: <span id="node_mutual_count"></span></button>
        </h2>
        <div id="collapseOne" class="accordion-collapse collapse" aria-labelledby="headingOne" data-bs-parent="#accordion">
          <div class="accordion-body"><ul id="node_mutual_list" class="list-unstyled"></ul></div>
        </div>
      </div>
      <div class="accordion-item">
        <h2 class="accordion-header" id="headingTwo">
          <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseTwo" aria-expanded="false" aria-controls="collapseTwo">Inbound connections: <span id="node_in_count"></span></button>
        </h2>
        <div id="collapseTwo" class="accordion-collapse collapse" aria-labelledby="headingTwo" data-bs-parent="#accordion">
          <div class="accordion-body"><ul id="node_in_list" class="list-unstyled"></ul></div>
        </div>
      </div>
      <div class="accordion-item">
        <h2 class="accordion-header" id="headingThree">
          <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseThree" aria-expanded="false" aria-controls="collapseThree">Outbound connections: <span id="node_out_count"></span></button>
        </h2>
        <div id="collapseThree" class="accordion-collapse collapse" aria-labelledby="headingThree" data-bs-parent="#accordion">
          <div class="accordion-body"><ul id="node_out_list" class="list-unstyled"></ul></div>
        </div>
      </div>
    </div>
  </aside>

  <div class="modal fade" id="loading_modal" tabindex="-1" role="dialog" aria-label="Loading">
    <div class="modal-dialog" role="document" style="text-align:center;color:white;">
      <div class="spinner-border text-light" style="width:3rem;height:3rem;" role="status"></div>
      <p id="loading_message"></p>
      <span class="visually-hidden">please wait…</span>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "sigma":             "https://esm.sh/sigma@3.0.2",
      "sigma/rendering":   "https://esm.sh/sigma@3.0.2/rendering",
      "sigma/utils":       "https://esm.sh/sigma@3.0.2/utils",
      "graphology":        "https://esm.sh/graphology@0.25.4",
      "@sigma/edge-curve": "https://esm.sh/@sigma/edge-curve@3.0.0?external=sigma"
    }
  }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <script type="module" src="js/graph_timeline.js"></script>
</body>
</html>
