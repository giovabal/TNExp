{% load static %}
<nav class="sidebar" aria-label="Channel list">
  <a href="/" class="sidebar-brand">
    <div class="brand-icon">
      <i class="bi bi-broadcast" aria-hidden="true"></i>
    </div>
    <span class="brand-name">Pulpit</span>
  </a>
  <ul class="channel-list">
    {% for channel in channel_list %}
    <li>
      <a href="{{ channel.get_absolute_url }}"{% if selected_channel == channel %} class="active" aria-current="page"{% endif %}>
        <div class="ch-title">{{ channel.title }}</div>
        <div class="ch-meta">
          <span>{{ channel.message_set.all.count }} msgs</span>
          <span class="org-label">
            <span class="org-dot" style="background: {{ channel.organization.color }};"></span>
            <span class="org-name">{{ channel.organization }}</span>
          </span>
        </div>
      </a>
    </li>
    {% endfor %}
  </ul>
</nav>
