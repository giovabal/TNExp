{% load static %}
<nav class="sidebar" aria-label="Channel list">
  <a href="/" class="sidebar-brand">
    <div class="brand-icon">
      <i class="bi bi-broadcast" aria-hidden="true"></i>
    </div>
    <span class="brand-name">Pulpit</span>
  </a>
  <a href="{% url 'message-search' %}" class="sidebar-search-link{% if request.resolver_match.url_name == 'message-search' %} active{% endif %}">
    <i class="bi bi-search" aria-hidden="true"></i>
    Search messages
  </a>
  <div class="channel-search">
    <input type="search" id="channel-search-input" placeholder="Filter channels…" aria-label="Filter channels">
  </div>
  <ul class="channel-list" id="channel-list">
    {% for channel in channel_list %}
    <li>
      <a href="{{ channel.get_absolute_url }}"{% if selected_channel == channel %} class="active" aria-current="page"{% endif %}>
        <div class="ch-title">{{ channel.title }}</div>
        <div class="ch-meta">
          <span>{{ channel.message_set.all.count }} msgs</span>
          <span class="org-label">
            <span class="org-dot" style="background: {{ channel.organization.color }};" aria-hidden="true"></span>
            <span class="org-name">{{ channel.organization }}</span>
          </span>
        </div>
      </a>
    </li>
    {% endfor %}
  </ul>
  <script>
    (function () {
      var input = document.getElementById("channel-search-input");
      var items = document.querySelectorAll("#channel-list li");
      input.addEventListener("input", function () {
        var q = this.value.toLowerCase();
        items.forEach(function (li) {
          var name = li.querySelector(".ch-title").textContent.toLowerCase();
          li.style.display = name.includes(q) ? "" : "none";
        });
      });
    })();
  </script>
</nav>
