{% extends "webapp/index.html" %}
{% load static %}

{% block content %}
<div class="home-wrap">
  <div class="home-icon">
    <i class="bi bi-broadcast" aria-hidden="true"></i>
  </div>
  <h1 class="h4 fw-bold mb-1">Pulpit</h1>
  <p class="text-muted mb-4" style="font-size: .9rem;">Telegram channel network explorer. Select a channel from the list to browse its messages.</p>
  <div class="d-flex gap-2 flex-wrap">
    <a href="/admin/" class="btn btn-sm btn-outline-secondary">
      <i class="bi bi-gear me-1" aria-hidden="true"></i>Admin
    </a>
    <a href="/stats/" class="btn btn-sm btn-outline-secondary">
      <i class="bi bi-bar-chart me-1" aria-hidden="true"></i>Stats
    </a>
  </div>
</div>
{% endblock content %}
